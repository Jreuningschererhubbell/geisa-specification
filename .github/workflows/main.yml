name: CI-Latest

on:
  push:
    branches: [ autobuild ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup mermaid-cli
        uses: AnimMouse/setup-mermaid-cli@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Setup latex and image generation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive \
            texlive-latex-recommended \
            texlive-latex-extra \
            tex-gyre \
            librsvg2-bin \
            libxkbcommon0 

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Execute Makefile
        run: make all -j$(nproc) MMDC_FLAGS="--puppeteerConfigFile puppeteer-config.json" 

      - name: Create release artifact directory and copy build outputs
        id: release_info
        run: |
          RELEASE="$(tr -d '[:space:]' < source/geisa_release.txt)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          RELEASE_ID="${RELEASE}-${SHORT_SHA}"
          ARTIFACT_DIR="build/release/${RELEASE_ID}"

          mkdir -p "${ARTIFACT_DIR}"
          cp -R build/html "${ARTIFACT_DIR}/html"
          cp build/latex/geisaspecification.pdf "${ARTIFACT_DIR}/"

          echo "release_id=${RELEASE_ID}" >> "${GITHUB_OUTPUT}"
          echo "artifact_dir=${ARTIFACT_DIR}" >> "${GITHUB_OUTPUT}"

          echo "Release: ${{ steps.release_info.outputs.release_id }}" > "${ARTIFACT_DIR}/buildinfo.txt"
          echo "Build Time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "${ARTIFACT_DIR}/buildinfo.txt"
          echo "Git SHA: $(git rev-parse HEAD)" >> "${ARTIFACT_DIR}/buildinfo.txt"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geisa-specification-release-${{ steps.release_info.outputs.release_id }}
          path: ${{ steps.release_info.outputs.artifact_dir }}


